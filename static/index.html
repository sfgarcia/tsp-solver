<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TSP Solver</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#1e1e2e" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; }
    #controls {
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 8px 12px;
      background: #1e1e2e;
      color: #cdd6f4;
    }
    #row1, #row2 {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
    }
    #controls h1 { font-size: 1rem; font-weight: 600; white-space: nowrap; }
    button {
      padding: 6px 14px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 500;
      white-space: nowrap;
    }
    #btn-solve { background: #89b4fa; color: #1e1e2e; flex: 1; }
    #btn-solve:hover { background: #74c7ec; }
    #btn-clear { background: #f38ba8; color: #1e1e2e; flex: 1; }
    #btn-clear:hover { background: #eba0ac; }
    #btn-gas { background: #fab387; color: #1e1e2e; flex: 1; }
    #btn-gas:hover { background: #f9e2af; }
    #btn-gas.active { background: #f9e2af; outline: 2px solid #fab387; }
    #status { font-size: 0.8rem; color: #a6e3a1; }
    #hint { font-size: 0.8rem; color: #6c7086; display: none; }
    @media (min-width: 600px) { #hint { display: inline; } }
    #map { flex: 1; }

    #search-wrapper {
      position: relative;
      display: flex;
      flex: 1;
      gap: 6px;
    }
    #search-input {
      padding: 6px 10px;
      border-radius: 6px;
      border: 1px solid #45475a;
      background: #313244;
      color: #cdd6f4;
      font-size: 0.875rem;
      flex: 1;
      min-width: 0;
      outline: none;
    }
    #search-input::placeholder { color: #6c7086; }
    #btn-search { background: #a6e3a1; color: #1e1e2e; }
    #btn-search:hover { background: #94e2d5; }
    #search-results {
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      width: 320px;
      background: #313244;
      border: 1px solid #45475a;
      border-radius: 6px;
      z-index: 1000;
      max-height: 220px;
      overflow-y: auto;
    }
    .search-result-item {
      padding: 8px 12px;
      cursor: pointer;
      font-size: 0.8rem;
      color: #cdd6f4;
      border-bottom: 1px solid #45475a;
    }
    .search-result-item:last-child { border-bottom: none; }
    .search-result-item:hover { background: #45475a; }
  </style>
</head>
<body>
  <div id="controls">
    <div id="row1">
      <h1>TSP</h1>
      <div id="search-wrapper">
        <input id="search-input" type="text" placeholder="Buscar dirección…"
               onkeydown="if(event.key==='Enter') searchAddress()" />
        <button id="btn-search" onclick="searchAddress()">Buscar</button>
        <div id="search-results" style="display:none;"></div>
      </div>
    </div>
    <div id="row2">
      <button id="btn-solve" onclick="solveTSP()">Calcular ruta</button>
      <button id="btn-gas" onclick="toggleGas()">⛽ Bencineras</button>
      <button id="btn-clear" onclick="clearAll()">Limpiar</button>
      <span id="status"></span>
      <span id="hint">Busca o haz clic en el mapa para agregar puntos</span>
    </div>
  </div>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const map = L.map('map').setView([-33.4254, -70.5822], 15);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
      maxZoom: 19,
    }).addTo(map);

    const markers = [];
    const coordinates = [];
    let polyline = null;

    map.on('click', function (e) {
      const { lat, lng } = e.latlng;
      coordinates.push({ lat, lng });

      const marker = L.marker([lat, lng])
        .addTo(map)
        .bindPopup(`Punto ${markers.length + 1}<br>lat: ${lat.toFixed(5)}, lng: ${lng.toFixed(5)}`)
        .openPopup();

      markers.push(marker);
      setStatus(`${markers.length} punto(s) agregado(s)`);
    });

    async function solveTSP() {
      if (coordinates.length < 3) {
        setStatus('Agrega al menos 3 puntos primero.', true);
        return;
      }

      setStatus('Resolviendo…');

      try {
        const response = await fetch('/solve', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ coordinates }),
        });

        const data = await response.json();

        if (!response.ok) {
          setStatus('Error: ' + (data.error || response.statusText), true);
          return;
        }

        await drawRoute(data);
      } catch (err) {
        setStatus('Error de conexión: ' + err.message, true);
      }
    }

    async function fetchOsrmGeometry(route) {
      try {
        const resp = await fetch('/route-geometry', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ coordinates: route })
        });
        const data = await resp.json();
        if (data.routes && data.routes[0]) return data.routes[0].geometry;
      } catch (_) {}
      return null;
    }

    async function drawRoute(data) {
      if (polyline) map.removeLayer(polyline);

      if (data.routing === 'osrm') {
        setStatus('Trazando ruta por calles…');
        const geometry = await fetchOsrmGeometry(data.route);
        if (geometry) {
          // GeoJSON coordinates are [lng, lat] — Leaflet needs [lat, lng]
          const latlngs = geometry.coordinates.map(([lng, lat]) => [lat, lng]);
          polyline = L.polyline(latlngs, { color: '#f38ba8', weight: 4, opacity: 0.9 }).addTo(map);
          map.fitBounds(polyline.getBounds(), { padding: [20, 20] });
          const mins = Math.round(data.total_travel_time_secs / 60);
          setStatus(`Tiempo estimado: ${mins} min (ruta real por calles)`);
          return;
        }
      }

      // Fallback: straight lines
      const latlngs = data.route.map(c => [c.lat, c.lng]);
      polyline = L.polyline(latlngs, { color: '#f38ba8', weight: 3, opacity: 0.9 }).addTo(map);
      map.fitBounds(polyline.getBounds(), { padding: [20, 20] });
      const label = data.total_distance_km != null
        ? `Distancia total: ${data.total_distance_km.toFixed(1)} km`
        : `Tiempo estimado: ${Math.round(data.total_travel_time_secs / 60)} min`;
      setStatus(label);
    }

    function clearAll() {
      markers.forEach(m => map.removeLayer(m));
      markers.length = 0;
      coordinates.length = 0;

      if (polyline) {
        map.removeLayer(polyline);
        polyline = null;
      }

      setStatus('');
    }

    function setStatus(msg, isError = false) {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.style.color = isError ? '#f38ba8' : '#a6e3a1';
    }

    // --- Geocoder (Nominatim / OpenStreetMap) ---
    async function searchAddress() {
      const query = document.getElementById('search-input').value.trim();
      if (!query) return;

      const resultsEl = document.getElementById('search-results');
      resultsEl.style.display = 'none';
      resultsEl.innerHTML = '';
      setStatus('Buscando…');

      try {
        const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}&format=json&limit=5`;
        const res = await fetch(url, { headers: { 'Accept-Language': 'es' } });
        const results = await res.json();

        if (results.length === 0) {
          setStatus('No se encontraron resultados.', true);
          return;
        }

        setStatus('');
        results.forEach(r => {
          const item = document.createElement('div');
          item.className = 'search-result-item';
          item.textContent = r.display_name;
          item.onclick = () => selectSearchResult(parseFloat(r.lat), parseFloat(r.lon), r.display_name);
          resultsEl.appendChild(item);
        });
        resultsEl.style.display = 'block';
      } catch (err) {
        setStatus('Error al buscar: ' + err.message, true);
      }
    }

    function selectSearchResult(lat, lng, name) {
      document.getElementById('search-results').style.display = 'none';
      document.getElementById('search-input').value = '';

      map.setView([lat, lng], 14);

      coordinates.push({ lat, lng });
      const marker = L.marker([lat, lng])
        .addTo(map)
        .bindPopup(`Punto ${markers.length + 1}<br>${name}`)
        .openPopup();
      markers.push(marker);
      setStatus(`${markers.length} punto(s) agregado(s)`);
    }

    // Cerrar resultados al hacer clic fuera
    document.addEventListener('click', e => {
      if (!document.getElementById('search-wrapper').contains(e.target)) {
        document.getElementById('search-results').style.display = 'none';
      }
    });

    // ── Bencineras ────────────────────────────────────────────────────────────
    let gasActive = false;
    let gasMarkers = [];
    let gasDebounceTimer = null;

    function toggleGas() {
      gasActive = !gasActive;
      document.getElementById('btn-gas').classList.toggle('active', gasActive);
      if (gasActive) loadGas();
      else clearGasMarkers();
    }

    async function loadGas() {
      if (!gasActive) return;
      const b = map.getBounds();
      const url = `/bencineras?south=${b.getSouth()}&north=${b.getNorth()}&west=${b.getWest()}&east=${b.getEast()}`;
      setStatus('Cargando bencineras…');
      try {
        const data = await fetch(url).then(r => r.json());
        clearGasMarkers();
        data.forEach(g => addGasMarker(g));
        setStatus(data.length > 0 ? `${data.length} bencineras encontradas` : 'Sin bencineras en esta área');
      } catch (e) {
        setStatus('Error al cargar bencineras', true);
      }
    }

    function addGasMarker(g) {
      const icon = L.divIcon({
        className: '',
        html: '<div style="font-size:18px;line-height:1;filter:drop-shadow(0 1px 2px rgba(0,0,0,.5))">⛽</div>',
        iconSize: [22, 22],
        iconAnchor: [11, 11],
      });

      // Build popup DOM imperatively to prevent XSS
      const container = document.createElement('div');

      const title = document.createElement('b');
      title.textContent = g.nombre;
      container.appendChild(title);

      if (g.direccion) {
        container.appendChild(document.createElement('br'));
        container.appendChild(document.createTextNode(g.direccion));
      }

      // Add fuel prices if available
      if (g.precio_93 || g.precio_95 || g.precio_97) {
        container.appendChild(document.createElement('br'));
        const pricesDiv = document.createElement('div');
        pricesDiv.style.cssText = 'font-size:0.8rem;margin-top:4px;color:#6c7086';
        let priceText = [];
        if (g.precio_93) priceText.push(`93: $${g.precio_93}`);
        if (g.precio_95) priceText.push(`95: $${g.precio_95}`);
        if (g.precio_97) priceText.push(`97: $${g.precio_97}`);
        pricesDiv.textContent = priceText.join(' | ');
        container.appendChild(pricesDiv);
      }

      container.appendChild(document.createElement('br'));

      const btn = document.createElement('button');
      btn.textContent = '+ Agregar a ruta';
      btn.style.cssText = 'margin-top:6px;padding:4px 10px;background:#89b4fa;border:none;border-radius:4px;cursor:pointer;font-size:0.8rem';
      btn.addEventListener('click', () => addGasToRoute(g.lat, g.lng, g.nombre));
      container.appendChild(btn);

      const m = L.marker([g.lat, g.lng], { icon }).addTo(map).bindPopup(container);
      gasMarkers.push(m);
    }

    function clearGasMarkers() {
      gasMarkers.forEach(m => map.removeLayer(m));
      gasMarkers = [];
    }

    function addGasToRoute(lat, lng, nombre) {
      coordinates.push({ lat, lng });
      const marker = L.marker([lat, lng])
        .addTo(map)
        .bindPopup(`Punto ${markers.length + 1}<br>${nombre}`)
        .openPopup();
      markers.push(marker);
      setStatus(`${markers.length} punto(s) en ruta`);
    }

    map.on('moveend', () => {
      if (!gasActive) return;
      clearTimeout(gasDebounceTimer);
      gasDebounceTimer = setTimeout(loadGas, 500);
    });

    // Registrar service worker (necesario para PWA)
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }
  </script>
</body>
</html>
