name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    name: Build Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release
        run: cargo build --release --verbose

      - name: Create release archive
        run: |
          mkdir -p release
          cp target/release/tsp-solver release/ || true
          cp -r static release/
          tar czf tsp-solver-linux-x64.tar.gz -C release .
          ls -lh tsp-solver-linux-x64.tar.gz

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tsp-solver-release
          path: tsp-solver-linux-x64.tar.gz

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: tsp-solver-linux-x64.tar.gz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
